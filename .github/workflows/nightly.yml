name: Nightly Build & Deploy

on:
  schedule:
    - cron: '0 2 * * *'  # every night at 2am UTC
  workflow_dispatch:       # allow manual trigger from GitHub UI

env:
  AWS_REGION: us-east-1
  ECR_REPO_BACKEND: product-manager-backend
  ECR_REPO_FRONTEND: product-manager-frontend

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Spin up a TEMPORARY EC2, build from source, run smoke tests,
  #        then always terminate the temp EC2 (pass or fail).
  #        Only if this job SUCCEEDS will Job 2 run.
  # -----------------------------------------------------------------------
  smoke-test-on-temp-ec2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SOURCE_REPO }}     # e.g. your-username/product-manager-cms
          token: ${{ secrets.SOURCE_REPO_TOKEN }}     # GitHub PAT with repo read access

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Launch temporary EC2
        run: |
          # Write user-data script to install Docker on first boot
          cat > /tmp/user-data.sh << 'USERDATA'
          #!/bin/bash
          apt-get update
          apt-get install -y docker.io docker-compose-plugin git
          systemctl enable docker
          systemctl start docker
          usermod -aG docker ubuntu
          USERDATA

          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id ${{ secrets.TEMP_EC2_AMI_ID }} \
            --instance-type t3.small \
            --key-name ${{ secrets.EC2_KEY_NAME }} \
            --security-group-ids ${{ secrets.EC2_SECURITY_GROUP_ID }} \
            --iam-instance-profile Name=LabInstanceProfile \
            --user-data file:///tmp/user-data.sh \
            --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=ci-nightly-temp}]' \
            --query 'Instances[0].InstanceId' \
            --output text)

          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "Launched temp EC2: $INSTANCE_ID"

      - name: Wait for temp EC2 to pass status checks
        run: |
          echo "Waiting for ${{ env.INSTANCE_ID }} to be ready..."
          aws ec2 wait instance-status-ok --instance-ids ${{ env.INSTANCE_ID }}

          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids ${{ env.INSTANCE_ID }} \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "TEMP_EC2_IP=$PUBLIC_IP" >> $GITHUB_ENV
          echo "Temp EC2 IP: $PUBLIC_IP"

          # Wait for user-data (Docker install) to finish
          echo "Waiting 60s for Docker installation to complete..."
          sleep 60

      - name: Deploy app on temp EC2 (local build from source)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.TEMP_EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            git clone https://x-access-token:${{ secrets.SOURCE_REPO_TOKEN }}@github.com/${{ secrets.SOURCE_REPO }}.git ~/app
            cd ~/app

            # Build and start containers (uses docker-compose.yml — local dev with MySQL)
            docker compose up -d --build

            # Poll until backend /health responds (max 2 min)
            echo "Waiting for backend to be ready..."
            timeout 120 bash -c 'until curl -sf http://localhost:3000/health; do sleep 5; done'
            echo "Backend is up."

      - name: Run smoke tests on temp EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.TEMP_EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            bash smoke-tests/smoke.sh http://localhost:3000

      # Always terminate the temp EC2, regardless of pass/fail
      - name: Terminate temp EC2
        if: always()
        run: |
          aws ec2 terminate-instances --instance-ids ${{ env.INSTANCE_ID }}
          echo "Terminated temp EC2: ${{ env.INSTANCE_ID }}"

  # -----------------------------------------------------------------------
  # Job 2: Smoke tests passed → build production images and push to ECR.
  #        Skipped automatically if Job 1 failed.
  # -----------------------------------------------------------------------
  push-to-ecr:
    needs: smoke-test-on-temp-ec2
    runs-on: ubuntu-latest
    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_BACKEND }}:latest \
            ./backend
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_BACKEND }}:latest

      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_FRONTEND }}:latest \
            ./frontend
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_FRONTEND }}:latest

  # -----------------------------------------------------------------------
  # Job 3: Images are in ECR → pull and deploy to the pre-allocated QA EC2.
  #        Skipped automatically if Job 2 failed.
  # -----------------------------------------------------------------------
  deploy-to-qa:
    needs: push-to-ecr
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to QA EC2 from ECR
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QA_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # AWS Academy uses temporary credentials — pass them explicitly
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            export AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}
            export AWS_DEFAULT_REGION=us-east-1

            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS --password-stdin ${{ needs.push-to-ecr.outputs.ecr_registry }}

            cd ~/product-manager-cms
            git pull origin master

            export ECR_REGISTRY=${{ needs.push-to-ecr.outputs.ecr_registry }}
            export RDS_ENDPOINT=${{ secrets.RDS_ENDPOINT }}
            export DB_USER=${{ secrets.DB_USER }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            echo "Deployment to QA complete."
